name: Traced Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  traced-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: false

    - name: Record trace start
      run: echo "TRACE_START=$(date -u +%Y-%m-%dT%H:%M:%S.%NZ)" >> "$GITHUB_ENV"

    - name: Build project
      run: go build ./...

    - name: Record build end
      run: echo "BUILD_END=$(date -u +%Y-%m-%dT%H:%M:%S.%NZ)" >> "$GITHUB_ENV"

    - name: Run tests
      run: go test ./...

    - name: Generate OTel trace artifact
      if: always()
      run: |
        TRACE_ID="$(openssl rand -hex 16)"
        JOB_SPAN="$(openssl rand -hex 8)"
        BUILD_SPAN="$(openssl rand -hex 8)"
        TEST_SPAN="$(openssl rand -hex 8)"
        NOW="$(date -u +%Y-%m-%dT%H:%M:%S.%NZ)"
        BUILD_END="${BUILD_END:-$NOW}"

        printf '{"Name":"go build","SpanContext":{"TraceID":"%s","SpanID":"%s","TraceFlags":"01"},"Parent":{"TraceID":"%s","SpanID":"%s","TraceFlags":"01"},"SpanKind":1,"StartTime":"%s","EndTime":"%s","Attributes":[{"Key":"type","Value":{"Type":"STRING","Value":"build"}},{"Key":"tool","Value":{"Type":"STRING","Value":"go"}}],"Events":null,"Links":null,"Status":{"Code":"Ok","Description":""}}\n' \
          "$TRACE_ID" "$BUILD_SPAN" "$TRACE_ID" "$JOB_SPAN" "$TRACE_START" "$BUILD_END" > "$RUNNER_TEMP/gha-trace.json"

        printf '{"Name":"go test","SpanContext":{"TraceID":"%s","SpanID":"%s","TraceFlags":"01"},"Parent":{"TraceID":"%s","SpanID":"%s","TraceFlags":"01"},"SpanKind":1,"StartTime":"%s","EndTime":"%s","Attributes":[{"Key":"type","Value":{"Type":"STRING","Value":"test"}},{"Key":"tool","Value":{"Type":"STRING","Value":"go"}}],"Events":null,"Links":null,"Status":{"Code":"Ok","Description":""}}\n' \
          "$TRACE_ID" "$TEST_SPAN" "$TRACE_ID" "$JOB_SPAN" "$BUILD_END" "$NOW" >> "$RUNNER_TEMP/gha-trace.json"

    - name: Upload trace artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gha-trace-build
        path: ${{ runner.temp }}/gha-trace.json
        retention-days: 30

  traced-lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: false

    - name: Record trace start
      run: echo "TRACE_START=$(date -u +%Y-%m-%dT%H:%M:%S.%NZ)" >> "$GITHUB_ENV"

    - name: Run vet
      run: go vet ./...

    - name: Generate OTel trace artifact
      if: always()
      run: |
        TRACE_ID="$(openssl rand -hex 16)"
        JOB_SPAN="$(openssl rand -hex 8)"
        VET_SPAN="$(openssl rand -hex 8)"
        NOW="$(date -u +%Y-%m-%dT%H:%M:%S.%NZ)"

        printf '{"Name":"go vet","SpanContext":{"TraceID":"%s","SpanID":"%s","TraceFlags":"01"},"Parent":{"TraceID":"%s","SpanID":"%s","TraceFlags":"01"},"SpanKind":1,"StartTime":"%s","EndTime":"%s","Attributes":[{"Key":"type","Value":{"Type":"STRING","Value":"lint"}},{"Key":"tool","Value":{"Type":"STRING","Value":"go-vet"}}],"Events":null,"Links":null,"Status":{"Code":"Ok","Description":""}}\n' \
          "$TRACE_ID" "$VET_SPAN" "$TRACE_ID" "$JOB_SPAN" "$TRACE_START" "$NOW" > "$RUNNER_TEMP/gha-trace.json"

    - name: Upload trace artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gha-trace-lint
        path: ${{ runner.temp }}/gha-trace.json
        retention-days: 30
