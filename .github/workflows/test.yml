name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  required-check:
    runs-on: ubuntu-latest
    steps:
      - name: Required check
        run: |
          echo "Running required check..."
          sleep 2
          echo "Done!"

  optional-check:
    runs-on: ubuntu-latest
    steps:
      - name: Optional check
        run: |
          echo "Running optional check..."
          sleep 2
          echo "Done!"

  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Record trace start
      run: echo "TRACE_START=$(date -u +%Y-%m-%dT%H:%M:%S.%NZ)" >> "$GITHUB_ENV"

    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.14.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    - name: Run tests
      run: bazel test //...

    - name: Record test end
      run: echo "TEST_END=$(date -u +%Y-%m-%dT%H:%M:%S.%NZ)" >> "$GITHUB_ENV"

    - name: Build
      run: bazel build //cmd/...

    - name: Record build end
      run: echo "BUILD_END=$(date -u +%Y-%m-%dT%H:%M:%S.%NZ)" >> "$GITHUB_ENV"

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: false

    - name: Start Observability Stack
      run: ./run.sh up

    - name: Run E2E Analysis Test
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Use a public PR for testing
        ./run.sh cli https://github.com/stefanpenner/gha-analyzer/pull/1

    - name: Run E2E Simulation
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: ./run.sh simulate

    - name: Verify Stack Status
      run: ./run.sh status

    - name: Generate OTel trace artifact
      if: always()
      run: |
        TRACE_ID="$(openssl rand -hex 16)"
        JOB_SPAN="$(openssl rand -hex 8)"
        TEST_SPAN="$(openssl rand -hex 8)"
        BUILD_SPAN="$(openssl rand -hex 8)"
        NOW="$(date -u +%Y-%m-%dT%H:%M:%S.%NZ)"
        TEST_END="${TEST_END:-$NOW}"
        BUILD_END="${BUILD_END:-$NOW}"

        printf '{"Name":"bazel test","SpanContext":{"TraceID":"%s","SpanID":"%s","TraceFlags":"01"},"Parent":{"TraceID":"%s","SpanID":"%s","TraceFlags":"01"},"SpanKind":1,"StartTime":"%s","EndTime":"%s","Attributes":[{"Key":"type","Value":{"Type":"STRING","Value":"test"}},{"Key":"tool","Value":{"Type":"STRING","Value":"bazel"}}],"Events":null,"Links":null,"Status":{"Code":"Ok","Description":""}}\n' \
          "$TRACE_ID" "$TEST_SPAN" "$TRACE_ID" "$JOB_SPAN" "$TRACE_START" "$TEST_END" > "$RUNNER_TEMP/gha-trace.json"

        printf '{"Name":"bazel build","SpanContext":{"TraceID":"%s","SpanID":"%s","TraceFlags":"01"},"Parent":{"TraceID":"%s","SpanID":"%s","TraceFlags":"01"},"SpanKind":1,"StartTime":"%s","EndTime":"%s","Attributes":[{"Key":"type","Value":{"Type":"STRING","Value":"build"}},{"Key":"tool","Value":{"Type":"STRING","Value":"bazel"}}],"Events":null,"Links":null,"Status":{"Code":"Ok","Description":""}}\n' \
          "$TRACE_ID" "$BUILD_SPAN" "$TRACE_ID" "$JOB_SPAN" "$TEST_END" "$BUILD_END" >> "$RUNNER_TEMP/gha-trace.json"

    - name: Upload trace artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: gha-trace-test
        path: ${{ runner.temp }}/gha-trace.json
        retention-days: 30