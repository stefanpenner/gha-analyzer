version: 2

builds:
  - id: otel-explorer
    main: ./cmd/otel-explorer
    binary: otel-explorer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: otel-explorer
    builds: [otel-explorer]
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - none*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: stefanpenner
    name: otel-explorer
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: otel-explorer
    repository:
      owner: stefanpenner
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/stefanpenner/otel-explorer"
    description: "Analyze OpenTelemetry traces to identify performance bottlenecks"
    license: ""
    install: |
      bin.install "otel-explorer"
    test: |
      system "#{bin}/otel-explorer", "--help"
